<div class="auth-container">
  <div class="auth-card premium-card animate-fade-in">
    <div class="auth-header">
      <div class="logo-icon text-gradient">
        <lucide-icon [img]="icons.Wallet" [size]="48" [strokeWidth]="2.5"></lucide-icon>
      </div>
      <h2 class="auth-title">Create Account</h2>
      <p class="auth-subtitle">Join us to manage your expenses efficiently.</p>
    </div>

    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()" class="auth-form" autocomplete="off">
      <!-- Hidden inputs to trick browser autofill -->
      <input type="text" style="display:none" aria-hidden="true" autocomplete="name">
      <input type="email" style="display:none" aria-hidden="true" autocomplete="email">
      <input type="password" style="display:none" aria-hidden="true" autocomplete="new-password">
      <div *ngIf="errorMessage" class="error-alert stagger-1">
        {{ errorMessage }}
      </div>
      <div *ngIf="successMessage" class="success-alert stagger-1">
        {{ successMessage }}
      </div>

      <div class="form-group stagger-1">
        <label class="form-label">Full Name</label>
        <div class="input-with-icon">
          <lucide-icon [img]="icons.User" [size]="18" class="input-icon"></lucide-icon>
          <input type="text" formControlName="name" class="form-control" placeholder="Enter your full name" autocomplete="off">
        </div>
        <small *ngIf="isInvalid('name')" class="field-error">Name must be at least 2 characters.</small>
      </div>

      <div class="form-group stagger-2">
        <label class="form-label">Email</label>
        <div class="input-with-icon">
          <lucide-icon [img]="icons.Mail" [size]="18" class="input-icon"></lucide-icon>
          <input type="email" formControlName="email" class="form-control" placeholder="Enter your email" autocomplete="off">
        </div>
        <small *ngIf="isInvalid('email')" class="field-error">Enter a valid email address.</small>
      </div>

      <div class="form-group stagger-3">
        <label class="form-label">Password</label>
        <div class="input-with-icon">
          <lucide-icon [img]="icons.Lock" [size]="18" class="input-icon"></lucide-icon>
          <input type="password" formControlName="password" class="form-control" placeholder="Create a password" autocomplete="new-password">
        </div>
        <small *ngIf="isInvalid('password')" class="field-error">Password must be at least 6 characters.</small>
      </div>

      <button type="submit" class="btn-primary auth-submit stagger-4" [disabled]="signupForm.invalid || isLoading">
        <span *ngIf="!isLoading">Sign Up</span>
        <span *ngIf="isLoading">Creating account...</span>
        <span *ngIf="isLoading" class="spinner"></span>
        <lucide-icon *ngIf="!isLoading" [img]="icons.ArrowRight" [size]="18"></lucide-icon>
      </button>
    </form>

    <div class="auth-footer stagger-4">
      <p>Already have an account? <a routerLink="/login" class="text-gradient">Sign in</a></p>
    </div>
  </div>
</div>
